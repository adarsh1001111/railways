<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RRB APO Grade B CBT Practice Quiz</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div
      id="paper-chooser-panel"
      style="
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      "
    >
      <div
        style="
          background: var(--surface);
          padding: 20px;
          border-radius: 12px;
          border: 1px solid var(--border);
        "
      >
        <h2 style="margin: 0 0 12px 0; color: var(--text)">Choose a Paper</h2>
        <div style="display: flex; gap: 8px; align-items: center">
          <select id="paper-chooser"></select>
          <button class="btn" onclick="startPaper()">Start</button>
        </div>
      </div>
    </div>

    <div class="quiz-wrapper" style="display: none">
      <aside class="sidebar">
        <div class="paper-select">
          <label style="font-weight: 700; color: var(--text)">Paper</label>
          <select id="paper-select"></select>
        </div>

        <div style="display: flex; align-items: center; gap: 8px">
          <div style="color: var(--text-light)">Unanswered</div>
          <div id="unanswered-count" style="font-weight: 800">0</div>
        </div>

        <div id="sidebar-pills" class="question-grid"></div>

        <div
          style="
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
          "
        >
          <button class="btn small" onclick="finishAndReview()">
            Finish & Review
          </button>
          <button class="btn secondary small" onclick="downloadReview()">
            Download Review
          </button>
        </div>
      </aside>

      <div class="main-panel">
        <div id="quiz-window">
          <div class="quiz-header">
            <div style="display: flex; gap: 12px; align-items: center">
              <h1>RRB APO Grade B CBT</h1>
              <div class="subtitle">
                Question <span id="current-idx">1</span> of
                <span id="total-count">0</span>
              </div>
            </div>
            <div
              style="
                flex: 1;
                margin-left: 12px;
                display: flex;
                gap: 12px;
                align-items: center;
              "
            >
              <div class="progress-bar">
                <div id="progress" class="progress-fill"></div>
              </div>
              <div
                id="timer"
                style="
                  min-width: 70px;
                  text-align: right;
                  color: var(--text-light);
                  font-weight: 700;
                "
              >
                00:00
              </div>
            </div>
          </div>

          <div class="quiz-body" id="quiz-body-scroll">
            <div id="question-container"></div>
          </div>

          <div class="quiz-footer">
            <div
              style="
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
              "
            >
              <button class="btn secondary small" onclick="resetSelection()">
                Reset
              </button>
              <button class="btn small" onclick="skipQuestion()">Skip</button>
              <button class="btn small" onclick="prevQuestion()">
                Previous
              </button>
              <button class="btn small" onclick="nextQuestion()">Next</button>
            </div>
          </div>
        </div>

        <div id="result-window" class="result-screen">
          <h1>🎉 Assessment Completed!</h1>
          <p id="perf-msg" style="color: var(--text-light)"></p>
          <div class="score-display">
            <span id="score">0</span> / <span id="total-count-2">0</span>
          </div>
          <p class="review-note">
            Review below to see which questions were answered incorrectly, what
            you chose, and what the correct option was.
          </p>
          <div id="review-list" class="review-list"></div>
          <div
            style="display: flex; gap: 12px; margin-top: 18px; flex-wrap: wrap"
          >
            <button class="btn" onclick="returnToChooser()">
              Choose Another Paper
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="quiz.js"></script>
    <!-- Paper files are loaded from /papers/*.json; no placeholder question data is kept in index.html -->
  </body>
</html>
